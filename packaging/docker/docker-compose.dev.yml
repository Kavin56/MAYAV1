# docker-compose.dev.yml — Dev testability stack (no custom Dockerfile)
#
# Usage (from repo root):
#   docker compose -f packaging/docker/docker-compose.dev.yml up
#
# Then open http://localhost:5173 — already wired to headless, no config needed.
#
# Env overrides (optional, via .env or export):
#   MAYA_TOKEN        — shared client token (auto-generated if unset)
#   MAYA_HOST_TOKEN   — host/admin token (auto-generated if unset)
#   MAYA_WORKSPACE    — host path to mount as workspace (default: ./workspace)
#   MAYA_PORT         — host port to map to container :8787 (default: 8787)
#   WEB_PORT          — host port to map to container :5173 (default: 5173)
#   MAYA_DEV_ID       — unique ID for this stack (default: default)

x-shared: &shared
  image: node:22-bookworm-slim
  working_dir: /app
  volumes:
    # Mount the entire repo so both services share node_modules + source
    - ../../:/app
    - pnpm-store:/root/.local/share/pnpm/store
    - bun-install:/root/.bun
    - ${MAYA_WORKSPACE:-./workspace}:/workspace

services:
  orchestrator:
    <<: *shared
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        # --- Ensure workspace dir is writable ---
        mkdir -p /workspace && touch /workspace/.keep 2>/dev/null || true

        # --- Install system deps ---
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          curl ca-certificates unzip git >/dev/null 2>&1

        # --- Install bun (cached in named volume) ---
        export BUN_INSTALL="/root/.bun"
        export PATH="$$BUN_INSTALL/bin:$$PATH"
        if ! command -v bun >/dev/null 2>&1; then
          echo "[orchestrator] Installing bun..."
          curl -fsSL https://bun.sh/install | bash
        fi

        # --- Enable pnpm via corepack ---
        corepack enable && corepack prepare pnpm@10.27.0 --activate

        # --- Install deps ---
        echo "[orchestrator] Installing dependencies..."
        pnpm install --no-frozen-lockfile --network-concurrency 1 --child-concurrency 1

        # --- Build Linux binaries into container-local path ---
        # Avoids overwriting macOS-native binaries on the host mount.
        export MAYA_SERVER_BIN="/tmp/maya-bins/maya-server"
        export OPENCODE_ROUTER_BIN="/tmp/maya-bins/opencode-router"
        mkdir -p /tmp/maya-bins

        # --- Compile sidecars for the container architecture ---
        case "$(uname -m)" in
          x86_64|amd64)
            BUN_TARGET="bun-linux-x64"
            ;;
          aarch64|arm64)
            BUN_TARGET="bun-linux-arm64"
            ;;
          *)
            echo "Unsupported container architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        echo "[orchestrator] Building maya-server binary (linux)..."
        cd /app/packages/server && bun build --compile --target "$$BUN_TARGET" src/cli.ts --outfile "$$MAYA_SERVER_BIN"

        echo "[orchestrator] Building opencode-router binary (linux)..."
        OPENCODE_ROUTER_VERSION=$$(node -p "require('/app/packages/opencode-router/package.json').version")
        cd /app/packages/opencode-router && bun build --compile --target "$$BUN_TARGET" src/cli.ts \
          --define "__OPENCODE_ROUTER_VERSION__=\"$${OPENCODE_ROUTER_VERSION}\"" --outfile "$$OPENCODE_ROUTER_BIN"

        cd /app

        # --- Resolve tokens ---
        if [ -z "$$MAYA_TOKEN" ]; then
          MAYA_TOKEN=$$(cat /proc/sys/kernel/random/uuid)
          export MAYA_TOKEN
        fi
        if [ -z "$$MAYA_HOST_TOKEN" ]; then
          MAYA_HOST_TOKEN=$$(cat /proc/sys/kernel/random/uuid)
          export MAYA_HOST_TOKEN
        fi

        # Write tokens so the web service can source them
        mkdir -p /app/tmp
        printf 'MAYA_TOKEN=%s\nMAYA_HOST_TOKEN=%s\n' \
          "$$MAYA_TOKEN" "$$MAYA_HOST_TOKEN" > "/app/tmp/.dev-env-${MAYA_DEV_ID:-default}"

        echo ""
        echo "============================================"
        echo "  MAYA orchestrator"
        echo "  Server:     http://localhost:${MAYA_PORT:-8787}"
        echo "  Health:     http://localhost:${MAYA_PORT:-8787}/health"
        echo "  Token:      $$MAYA_TOKEN"
        echo "  Host token: $$MAYA_HOST_TOKEN"
        echo "============================================"
        echo ""

        exec pnpm --filter maya-orchestrator dev -- start \
          --workspace /workspace \
          --maya-host 0.0.0.0 \
          --maya-port 8787 \
          --maya-token "$$MAYA_TOKEN" \
          --maya-host-token "$$MAYA_HOST_TOKEN" \
          --maya-server-bin "$$MAYA_SERVER_BIN" \
          --opencode-router-bin "$$OPENCODE_ROUTER_BIN" \
          --approval auto \
          --allow-external \
          --no-opencode-auth \
          --cors "*"
    ports:
      - "${MAYA_PORT:-8787}:8787"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 90s
    environment:
      CI: "true"
      MAYA_TOKEN: ${MAYA_TOKEN:-}
      MAYA_HOST_TOKEN: ${MAYA_HOST_TOKEN:-}
      MAYA_DEV_ID: ${MAYA_DEV_ID:-default}
      MAYA_SIDECAR_SOURCE: external
 
  web:
    <<: *shared
    depends_on:
      orchestrator:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        # --- Install system deps ---
        apt-get update -qq && apt-get install -y -qq --no-install-recommends \
          curl ca-certificates >/dev/null 2>&1

        # --- Bun + pnpm ---
        export BUN_INSTALL="/root/.bun"
        export PATH="$$BUN_INSTALL/bin:$$PATH"
        if ! command -v bun >/dev/null 2>&1; then
          curl -fsSL https://bun.sh/install | bash
        fi
        corepack enable && corepack prepare pnpm@10.27.0 --activate

        # --- Read token written by orchestrator ---
        if [ -f "/app/tmp/.dev-env-${MAYA_DEV_ID:-default}" ]; then
          . "/app/tmp/.dev-env-${MAYA_DEV_ID:-default}"
          export VITE_MAYA_TOKEN="$$MAYA_TOKEN"
        fi

        echo ""
        echo "============================================"
        echo "  MAYA web UI"
        echo "  URL:   http://localhost:${WEB_PORT:-5173}"
        echo "  Token: $${VITE_MAYA_TOKEN:-<see orchestrator logs>}"
        echo "============================================"
        echo ""

        export VITE_MAYA_URL="http://localhost:${MAYA_PORT:-8787}"
        export VITE_MAYA_PORT="${MAYA_PORT:-8787}"
        export VITE_ALLOWED_HOSTS="all"
        export HOST="0.0.0.0"
        export PORT="5173"

        exec pnpm --filter maya-desktop dev \
          --host 0.0.0.0 \
          --port 5173 \
          --strictPort
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      MAYA_DEV_ID: ${MAYA_DEV_ID:-default}

volumes:
  pnpm-store:
    name: maya-dev-pnpm-store
  bun-install:
    name: maya-dev-bun-install
