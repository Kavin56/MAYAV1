<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAYA</title>

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500&display=swap" />
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("maya.themePref") || "system";
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = mode === "dark" || (mode === "system" && prefersDark) ? "dark" : "light";
          document.documentElement.dataset.theme = resolved;
          document.documentElement.style.colorScheme = resolved;
        } catch (e) {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
  </head>
  <body class="bg-dls-surface text-dls-text">
    <!-- Instant splash screen - shows before JS loads -->
    <div id="splash" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#18181b;z-index:9999;">
      <div style="text-align:center;">
        <img src="/maya-v1-logo.png" alt="MAYA" style="width:80px;height:80px;margin-bottom:16px;animation:pulse 1.5s ease-in-out infinite;" />
        <div style="color:#71717a;font-size:14px;font-family:system-ui,-apple-system,sans-serif;">Loading MAYA...</div>
      </div>
    </div>
    <style>
      @keyframes pulse {
        0%,100%{opacity:1;transform:scale(1);}
        50%{opacity:0.7;transform:scale(0.95);}
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
    <script>
      // Remove splash once React mounts
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            splash.style.transition = 'opacity 0.3s ease';
            setTimeout(function(){ splash.remove(); }, 300);
          }
        }, 100);
      });
    </script>
  </body>
</html>
